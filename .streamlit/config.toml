[theme]
base = "light"
primaryColor = "#1a4d8c"
backgroundColor = "#fafbfc"
secondaryBackgroundColor = "#f0f2f5"
textColor = "#0a1929"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# headless = true vereist op Streamlit Cloud (geen browser-popup poging)
headless = true
# runOnSave uit voor Cloud (read-only filesystem op sommige paden)
runOnSave = false
# XSRF-bescherming aan (veiliger); CORS daarom op default laten.
enableXsrfProtection = true

[client]
showErrorDetails = true
